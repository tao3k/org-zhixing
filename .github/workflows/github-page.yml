name: GitHub Page

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-page
  cancel-in-progress: true

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Harness
        run: npm run harness

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish dist to github-page branch
        shell: bash
        run: |
          set -euo pipefail

          publish_dir="${RUNNER_TEMP}/org-zhixing-github-page"
          rm -rf "${publish_dir}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git worktree add --detach "${publish_dir}" HEAD

          cd "${publish_dir}"
          git switch --orphan github-page
          git rm -rf . >/dev/null 2>&1 || true

          cp -R "${GITHUB_WORKSPACE}/dist/." .
          touch .nojekyll

          git add -A
          if git diff --cached --quiet; then
            echo "No GitHub Page changes to publish."
            exit 0
          fi

          git commit -m "Deploy org-zhixing ${GITHUB_SHA}"
          git push --force origin HEAD:github-page
